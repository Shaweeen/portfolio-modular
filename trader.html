<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trader - 21MBitcoin</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;700;900&display=swap" rel="stylesheet"/>
<style>
 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

 :root {
 --black: #000000;
 --white: #ffffff;
 --gray-1: #0a0a0a;
 --gray-2: #111111;
 --gray-3: #1a1a1a;
 --gray-4: #222222;
 --gray-5: #2e2e2e;
 --gray-6: #3a3a3a;
 --gray-text: #666666;
 --gray-light: #aaaaaa;
 --accent: #b8ff57;
 --accent-dim: rgba(184,255,87,0.12);
 --accent-border: rgba(184,255,87,0.25);
 --border: rgba(255,255,255,0.07);
 --border-strong: rgba(255,255,255,0.12);
 --profit: #2ebd85;
 --loss: #f6465d;
 }

 html, body {
 background: var(--black);
 color: var(--white);
 font-family: 'Noto Sans SC', sans-serif;
 min-height: 100vh;
 overflow-x: hidden;
 cursor: none;
 }

 /* Custom cursor */
 .cursor {
 position: fixed;
 width: 8px; height: 8px;
 background: var(--white);
 border-radius: 50%;
 pointer-events: none;
 z-index: 9999;
 transform: translate(-50%,-50%);
 transition: transform 0.1s, background 0.2s, width 0.2s, height 0.2s;
 mix-blend-mode: difference;
 }
 .cursor-ring {
 position: fixed;
 width: 32px; height: 32px;
 border: 1px solid rgba(255,255,255,0.4);
 border-radius: 50%;
 pointer-events: none;
 z-index: 9998;
 transform: translate(-50%,-50%);
 transition: transform 0.15s ease, width 0.2s, height 0.2s, border-color 0.2s;
 }

 /* Noise overlay */
 body::before {
 content: '';
 position: fixed;
 inset: 0;
 background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
 pointer-events: none;
 z-index: 100;
 opacity: 0.4;
 }

 /* NAVBAR */
 nav {
 position: fixed;
 top: 0; left: 0; right: 0;
 z-index: 500;
 display: flex;
 align-items: center;
 justify-content: space-between;
 padding: 0 32px;
 height: 54px;

 backdrop-filter: blur(20px);
 -webkit-backdrop-filter: blur(20px);
 }

 .nav-logo {
 font-family: 'DM Mono', monospace;
 font-size: 18px;
 font-weight: 700;
 letter-spacing: 0.05em;
 color: var(--white);
 text-decoration: none;
 text-transform: uppercase;
 }

 .nav-links {

 gap: 28px;
 list-style: none;
 }
 .nav-links a {
 font-size: 13px;
 color: var(--gray-light);
 text-decoration: none;
 letter-spacing: 0.03em;
 transition: color 0.2s;
 font-weight: 300;
 }
 .nav-links a:hover, .nav-links a.active { color: var(--accent); }

 .nav-right {

 align-items: center;

 }

 .nav-time {

 .nav-lang {

 letter-spacing: 0.04em;
 }

 .nav-theme-btn {
 width: 28px; height: 28px;

 border-radius: 50%;

 justify-content: center;

 .nav-theme-btn svg { stroke: var(--gray-light); width: 14px; height: 14px; }

 padding-top: 54px;

 align-items: center;
 gap: 8px;
 }

 .history-btn:hover {

 }

 @media (max-width: 900px) {

 }

 from { opacity: 0; transform: translateY(28px); }
 to { opacity: 1; transform: translateY(0); }

 position: fixed;
 bottom: 0; left: 0; right: 0;
 height: 22px;
 border-top: 1px solid var(--border);
 background: var(--gray-1);

 padding: 0 16px;
 gap: 16px;

 /* History Modal Styles */
 .history-modal {

 .history-list {

 .history-item {

 .history-side {

 .history-side.long {

 .history-side.short {

 }

<script>
 // Custom cursor
 const cursor = document.getElementById('cursor');
 const cursorRing = document.getElementById('cursorRing');

 document.addEventListener('mousemove', (e) => {
 cursor.style.left = e.clientX + 'px';
 cursor.style.top = e.clientY + 'px';
 cursorRing.style.left = e.clientX + 'px';
 cursorRing.style.top = e.clientY + 'px';
 });

 // Update time
 function updateTime() {
 const now = new Date();
 const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
 document.getElementById('navTime').textContent = timeStr;
 document.getElementById('lastUpdate').textContent = now.toLocaleString('zh-CN');
 }
 updateTime();
 setInterval(updateTime, 1000);

 // JSON数据源
 const JSON_URL = './data/trade_data.json';

 // 绘制Sparkline曲线 - 根据盈亏方向
 function drawSparkline(canvas, data, isLong, isProfit) {
 const ctx = canvas.getContext('2d');
 const width = canvas.width;
 const height = canvas.height;
 
 // 清空画布
 ctx.clearRect(0, 0, width, height);
 
 if (!data || data.length < 2) return;
 
 const min = Math.min(...data);
 const max = Math.max(...data);
 const range = max - min || 1;
 
 // 曲线逻辑技能：
 // Canvas Y轴：0在顶部，height在底部
 // Y坐标越小位置越靠上，Y坐标越大位置越靠下
 //
 // 1. 做多 + 正盈利 = 曲线向上 📈
 // 2. 做多 + 负盈利 = 曲线向下 📉
 // 3. 做空 + 正盈利 = 曲线向下 📉
 // 4. 做空 + 负盈利 = 曲线向上 📈
 //
 // 实现逻辑：
 // - 曲线向上 = 高价在上方 (shouldInvertY = true)
 // - 曲线向下 = 低价在上方 (shouldInvertY = false)
 //
 // shouldInvertY = true 时：高价(1) → Y坐标小 → 在上方
 // shouldInvertY = false 时：高价(1) → Y坐标大 → 在下方
 //
 // 所以：
 // - 做多盈利、做空亏损 → 曲线向上 → shouldInvertY = true
 // - 做空盈利、做多亏损 → 曲线向下 → shouldInvertY = false
 const shouldInvertY = (isLong && isProfit) || (!isLong && !isProfit);
 
 // 绘制价格曲线 - 从开仓点视角绘制
 ctx.beginPath();
 ctx.strokeStyle = isProfit ? '#2ebd85' : '#f6465d';
 ctx.lineWidth = 2;
 
 // 计算开仓点位置 (约30%位置作为默认值)
 const entryIndex = Math.floor(data.length * 0.3);
 const entryPrice = data[entryIndex];
 
 // 重新构建数据：从开仓点开始，前面用开仓价填充，后面用实际数据
 const chartData = [];
 // 开仓点前：用开仓价
 for (let i = 0; i < entryIndex; i++) {
 chartData.push(entryPrice);
 }
 // 开仓点后：用实际数据
 for (let i = entryIndex; i < data.length; i++) {
 chartData.push(data[i]);
 }
 
 const chartMin = Math.min(...chartData);
 const chartMax = Math.max(...chartData);
 const chartRange = chartMax - chartMin || 1;
 
 // 根据盈亏方向决定是否反转Y轴
 // 盈利时：价格对做多有利(上涨)或对做空有利(下跌)都应该显示为向上
 // 但实际上 Canvas Y轴是向下增加的，所以需要反转
 // 做多盈利：价格上涨，应该显示向上 (Y坐标减小)
 // 做空盈利：价格下跌，应该显示向下 (Y坐标增加)
 // 所以我们需要：做多盈利和做空亏损 -> 正常Y轴；做空盈利和做多亏损 -> 反转Y轴
 // shouldInvertY 已在上方定义，这里直接使用
 
 // 生成平滑曲线
 chartData.forEach((price, i) => {
 const x = (i / (chartData.length - 1)) * width;
 // 归一化Y坐标 (0-1)
 let normalizedY = (price - chartMin) / chartRange;
 // 修正：做多盈利和做空亏损时，高价应该在上方（Y坐标小）
 // 所以需要反转：高价(1) -> 小Y，低价(0) -> 大Y
 if (shouldInvertY) {
 normalizedY = 1 - normalizedY;
 }
 const y = normalizedY * (height - 10) + 5;
 
 if (i === 0) {
 ctx.moveTo(x, y);
 } else if (i <= entryIndex) {
 // 开仓点前的水平线
 ctx.lineTo(x, y);
 } else {
 // 开仓点后的曲线
 const prevX = ((i - 1) / (chartData.length - 1)) * width;
 let prevNormalizedY = (chartData[i-1] - chartMin) / chartRange;
 if (shouldInvertY) {
 prevNormalizedY = 1 - prevNormalizedY;
 }
 const prevY = prevNormalizedY * (height - 10) + 5;
 const cpX = (prevX + x) / 2;
 ctx.quadraticCurveTo(cpX, prevY, x, y);
 }
 });
 ctx.stroke();
 
 // 绘制开仓点标记
 const entryX = (entryIndex / (chartData.length - 1)) * width;
 let entryNormalizedY = (entryPrice - chartMin) / chartRange;
 if (shouldInvertY) {
 entryNormalizedY = 1 - entryNormalizedY;
 }
 const entryY = entryNormalizedY * (height - 10) + 5;
 
 // 绘制圆点
 ctx.beginPath();
 ctx.arc(entryX, entryY, 4, 0, Math.PI * 2);
 ctx.fillStyle = isProfit ? '#2ebd85' : '#f6465d';
 ctx.fill();
 
 // 绘制B/S标签
 ctx.font = 'bold 10px "DM Mono", monospace';
 ctx.fillStyle = isProfit ? '#2ebd85' : '#f6465d';
 ctx.textAlign = 'center';
 const label = isLong ? 'B' : 'S';
 ctx.fillText(label, entryX, entryY - 8);
 }

 // 渲染交易卡片
 async function renderTraderCards() {
 try {
 const response = await fetch(JSON_URL);
 const trades = await response.json();
 const container = document.getElementById('cards-container');
 const template = document.getElementById('card-template');
 
 container.innerHTML = ''; // 清空容器
 
 trades.forEach((trade, index) => {
 // 1. 克隆模板
 const clone = template.content.cloneNode(true);
 const card = clone.querySelector('.trade-card');
 
 // 2. 判断盈亏和方向
 const isProfit = parseFloat(trade.pnl) >= 0;
 const isLong = trade.side === 'LONG';
 const themeClass = isProfit ? 'positive' : 'negative';
 
 // 3. 添加主题类
 card.classList.add(themeClass);
 
 // 4. 注入基础数据
 card.querySelector('.symbol-name').textContent = trade.symbol;
 card.querySelector('.pnl-percentage').textContent = trade.pnl + '%';
 card.querySelector('.pnl-percentage').classList.add(themeClass);
 card.querySelector('.lev-tag').textContent = trade.lev + 'X';
 
 const sideTag = card.querySelector('.side-tag');
 sideTag.textContent = isLong ? '做多' : '做空';
 sideTag.classList.add(isLong ? 'long' : 'short');
 
 card.querySelector('.pnl-status-value').textContent = 
 (trade.profit || (parseFloat(trade.pnl) * parseFloat(trade.entry) / 100).toFixed(2)) + ' USDT';
 card.querySelector('.pnl-status-value').classList.add(themeClass);
 
 card.querySelector('.entry-val').textContent = trade.entry;
 card.querySelector('.last-val').textContent = trade.last || trade.exit || '--';
 
 // 时间显示：使用数据中的时间戳，格式为 DD/MM/YEAR
 const timeAgo = trade.time 
 ? new Date(trade.time).toLocaleDateString('zh-CN', {day: '2-digit', month: '2-digit', year: 'numeric'})
 : new Date().toLocaleDateString('zh-CN', {day: '2-digit', month: '2-digit', year: 'numeric'});
 card.querySelector('.time-ago').textContent = timeAgo;
 
 // 5. 绘制趋势图
 const canvas = clone.querySelector('.sparkline');
 if (trade.history && trade.history.length > 0) {
 drawSparkline(canvas, trade.history, isLong, isProfit);
 } else {
 // 如果没有历史数据，生成模拟曲线
 const mockData = generateMockCurve(isLong, isProfit, 20);
 drawSparkline(canvas, mockData, isLong, isProfit);
 }
 
 container.appendChild(clone);
 });
 } catch (err) {
 console.error('渲染失败:', err);
 }
 }

 // 生成模拟曲线数据
 function generateMockCurve(isLong, isProfit, points) {
 const data = [];
 const basePrice = 100;
 // 修正：做空盈利和做多亏损时，价格应该下跌（trend=-1）
 // 做多盈利和做空亏损时，价格应该上涨（trend=1）
 const trend = (isLong && isProfit) || (!isLong && !isProfit) ? 1 : -1;
 
 for (let i = 0; i < points; i++) {
 const progress = i / (points - 1);
 const noise = Math.sin(i * 0.5) * 5;
 const direction = trend * progress * 20;
 data.push(basePrice + direction + noise);
 }
 return data;
 }

 // 页面加载完成运行
 window.onload = renderTraderCards;

 // 显示历史记录
 async function showHistory(symbol) {
 const url = symbol 
 ? `https://trader.brandonwilson8855.workers.dev/history?symbol=${symbol}`
 : `https://trader.brandonwilson8855.workers.dev/history`;
 
 try {
 const res = await fetch(url);
 const { total, data } = await res.json();
 
 // 创建弹窗显示历史记录
 const modal = document.createElement('div');
 modal.className = 'history-modal';
 modal.innerHTML = `
 <div class="history-overlay" onclick="closeHistory()"></div>
 <div class="history-content">
 <div class="history-header">
 <h2>📊 历史交易记录 ${symbol ? '- ' + symbol : ''}</h2>
 <button class="close-btn" onclick="closeHistory()">&times;</button>
 </div>
 <div class="history-body">
 <p class="history-total">总计: ${total || data.length} 条记录</p>
 <div class="history-list">
 ${data.map(item => `
 <div class="history-item">
 <span class="history-symbol">${item.symbol}</span>
 <span class="history-pnl ${parseFloat(item.pnl) >= 0 ? 'positive' : 'negative'}">${item.pnl}%</span>
 <span class="history-profit ${parseFloat(item.profit || 0) >= 0 ? 'positive' : 'negative'}">${item.profit || '--'} USDT</span>
 <span class="history-side ${item.side.toLowerCase()}">${item.side}</span>
 <span class="history-date">${item.time ? new Date(item.time).toLocaleDateString('zh-CN', {day: '2-digit', month: '2-digit', year: 'numeric'}) : '--'}</span>
 </div>
 `).join('')}
 </div>
 </div>
 </div>
 `;
 document.body.appendChild(modal);
 } catch (err) {
 console.error('获取历史记录失败:', err);
 alert('获取历史记录失败，请稍后重试');
 }
 }

 // 关闭历史记录弹窗
 function closeHistory() {
 const modal = document.querySelector('.history-modal');
 if (modal) {
 modal.remove();
 }
 }
</script>
