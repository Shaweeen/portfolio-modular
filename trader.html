<html lang="zh">

<style>
 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

 :root {
 --black: #000000;
 --white: #ffffff;
 --gray-1: #0a0a0a;
 --gray-2: #111111;
 --gray-3: #1a1a1a;
 --gray-4: #222222;
 --gray-5: #2e2e2e;
 --gray-6: #3a3a3a;
 --gray-text: #666666;
 --gray-light: #aaaaaa;
 --accent: #b8ff57;
 --accent-dim: rgba(184,255,87,0.12);
 --accent-border: rgba(184,255,87,0.25);
 --border: rgba(255,255,255,0.07);
 --border-strong: rgba(255,255,255,0.12);
 --profit: #2ebd85;
 --loss: #f6465d;
 }

 html, body {
 background: var(--black);
 color: var(--white);
 font-family: 'Noto Sans SC', sans-serif;
 min-height: 100vh;
 overflow-x: hidden;
 cursor: none;
 }

 /* Custom cursor */
 .cursor {
 position: fixed;
 width: 8px; height: 8px;
 background: var(--white);
 border-radius: 50%;
 pointer-events: none;
 z-index: 9999;
 transform: translate(-50%,-50%);
 transition: transform 0.1s, background 0.2s, width 0.2s, height 0.2s;
 mix-blend-mode: difference;
 }
 .cursor-ring {
 position: fixed;
 width: 32px; height: 32px;
 border: 1px solid rgba(255,255,255,0.4);
 border-radius: 50%;
 pointer-events: none;
 z-index: 9998;
 transform: translate(-50%,-50%);
 transition: transform 0.15s ease, width 0.2s, height 0.2s, border-color 0.2s;
 }

 /* Noise overlay */
 body::before {
 content: '';
 position: fixed;
 inset: 0;
 background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
 pointer-events: none;
 z-index: 100;
 opacity: 0.4;
 }

 /* NAVBAR */
 nav {
 position: fixed;
 top: 0; left: 0; right: 0;
 z-index: 500;
 display: flex;
 align-items: center;
 justify-content: space-between;
 padding: 0 32px;
 height: 54px;
 border-bottom: 1px solid var(--border);
 background: rgba(0,0,0,0.85);
 backdrop-filter: blur(20px);
 -webkit-backdrop-filter: blur(20px);
 }

 .nav-logo {
 font-family: 'DM Mono', monospace;
 font-size: 18px;
 font-weight: 700;
 letter-spacing: 0.05em;
 color: var(--white);
 text-decoration: none;
 text-transform: uppercase;
 }

 .nav-links {
 display: flex;
 gap: 28px;
 list-style: none;
 }
 .nav-links a {
 font-size: 13px;
 color: var(--gray-light);
 text-decoration: none;
 letter-spacing: 0.03em;
 transition: color 0.2s;
 font-weight: 300;
 }
 .nav-links a:hover, .nav-links a.active { color: var(--accent); }

 .nav-right {
 display: flex;
 align-items: center;
 gap: 16px;
 }

 .nav-time {
 font-family: 'DM Mono', monospace;
 font-size: 12px;
 color: var(--gray-text);
 letter-spacing: 0.05em;
 }

 .nav-lang {
 font-size: 12px;
 color: var(--gray-light);
 font-family: 'DM Mono', monospace;
 border: 1px solid var(--border-strong);
 padding: 3px 8px;
 border-radius: 3px;
 cursor: none;
 letter-spacing: 0.04em;
 }

 .nav-theme-btn {
 width: 28px; height: 28px;
 border: 1px solid var(--border-strong);
 border-radius: 50%;
 background: none;
 cursor: none;
 display: flex;
 align-items: center;
 justify-content: center;
 }

 .nav-theme-btn svg { stroke: var(--gray-light); width: 14px; height: 14px; }

 /* MAIN */
 main {
 display: flex;
 min-height: 100vh;
 padding-top: 54px;
 position: relative;
 }

 .content {
 flex: 1;
 padding: 64px 48px;
 display: flex;
 flex-direction: column;
 }

 .page-header {
 margin-bottom: 48px;
 animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) both;

 }

 .history-btn {

 align-items: center;

 .history-btn:hover {

 background: var(--gray-3);

 }

 @media (max-width: 900px) {
 .history-btn {

 right: auto;
 top: auto;
 margin-top: 16px;
 }
 }

 @keyframes fadeUp {
 from { opacity: 0; transform: translateY(28px); }
 to { opacity: 1; transform: translateY(0); }
 }

 .page-title {
 font-family: 'Noto Serif SC', serif;

 font-weight: 900;
 line-height: 1.1;

 transition: background 0.3s;

 .trade-card.negative::before { background: var(--loss); }

 .chart-container {

 .sparkline {

 .pnl-info {

 .symbol-row {

 font-size: 16px;

 .time-ago {

 .pnl-percentage {
 font-family: 'DM Mono', monospace;

 font-weight: 500;
 }

 .pnl-percentage.positive { color: var(--profit); }
 .pnl-percentage.negative { color: var(--loss); }

 .meta-tags {
 display: flex;
 gap: 8px;
 flex-wrap: wrap;
 }

 .lev-tag, .side-tag {
 font-family: 'DM Mono', monospace;
 font-size: 10px;
 padding: 3px 8px;
 border-radius: 3px;
 font-weight: 500;
 }

 .lev-tag {

 color: var(--gray-light);
 }

 .side-tag.long {

 }

 .side-tag.short {

 }

 .pnl-status-row {
 display: flex;
 justify-content: space-between;
 align-items: center;
 padding: 10px 0;
 border-top: 1px solid var(--border);
 border-bottom: 1px solid var(--border);
 }

 .pnl-status-label {
 font-size: 12px;
 color: var(--gray-text);
 font-family: 'DM Mono', monospace;
 }

 .pnl-status-value {
 font-family: 'DM Mono', monospace;
 font-size: 16px;
 font-weight: 500;
 }

 .pnl-status-value.positive { color: var(--profit); }
 .pnl-status-value.negative { color: var(--loss); }

 .price-details {
 display: grid;
 grid-template-columns: repeat(2, 1fr);
 gap: 10px;
 font-size: 12px;
 }

 .price-details span {

 font-family: 'DM Mono', monospace;
 }

 .price-details .val {

 margin-left: 4px;

 /* Status bar */
 .status-bar {
 position: fixed;
 bottom: 0; left: 0; right: 0;
 height: 22px;
 border-top: 1px solid var(--border);
 background: var(--gray-1);
 display: flex;
 align-items: center;
 padding: 0 16px;
 gap: 16px;

 }

 .status-item {
 font-family: 'DM Mono', monospace;
 font-size: 10px;
 color: var(--gray-text);
 letter-spacing: 0.04em;
 }

 .status-item.online { color: #34a853; }
 .status-item.online::before {
 content: '';
 display: inline-block;
 width: 5px; height: 5px;
 border-radius: 50%;
 background: #34a853;
 margin-right: 5px;
 animation: pulse 2s infinite;
 }

 @keyframes pulse {
 0%,100% { opacity: 1; } 50% { opacity: 0.3; }
 }

 @media (max-width: 900px) {
 .content { padding: 40px 24px; }
 .cards-container { grid-template-columns: repeat(2, 1fr); }
 }

 @media (max-width: 600px) {
 .cards-container { grid-template-columns: 1fr; }
 }

 /* History Modal Styles */
 .history-modal {
 position: fixed;
 inset: 0;
 z-index: 1000;
 display: flex;
 align-items: center;
 justify-content: center;
 }

 .history-overlay {

 }

 .history-content {
 position: relative;
 background: var(--gray-2);
 border: 1px solid var(--border);
 border-radius: 12px;
 width: 90%;
 max-width: 800px;
 max-height: 80vh;
 overflow: hidden;
 animation: fadeUp 0.3s ease;
 }

 .history-header {
 display: flex;
 justify-content: space-between;
 align-items: center;
 padding: 20px 24px;
 border-bottom: 1px solid var(--border);
 }

 .history-header h2 {
 font-family: 'Noto Serif SC', serif;
 font-size: 18px;
 font-weight: 700;
 color: var(--white);
 }

 .close-btn {
 background: none;
 border: none;
 color: var(--gray-light);
 font-size: 24px;
 cursor: pointer;
 transition: color 0.2s;
 }

 .close-btn:hover {
 color: var(--white);
 }

 .history-body {
 padding: 20px 24px;
 overflow-y: auto;

 }

 .history-total {
 font-family: 'DM Mono', monospace;
 font-size: 14px;
 color: var(--gray-text);
 margin-bottom: 16px;
 padding-bottom: 12px;
 border-bottom: 1px solid var(--border);
 }

 .history-list {
 display: flex;
 flex-direction: column;
 gap: 12px;
 }

 .history-item {
 display: grid;
 grid-template-columns: 1fr 1fr 1.5fr 1fr 1.5fr;
 gap: 16px;
 align-items: center;
 padding: 12px 16px;
 background: var(--gray-1);
 border: 1px solid var(--border);
 border-radius: 8px;
 font-family: 'DM Mono', monospace;
 font-size: 13px;
 transition: border-color 0.2s;
 }

 .history-item:hover {
 border-color: var(--accent-border);
 }

 .history-symbol {
 font-weight: 500;
 color: var(--white);
 }

 .history-pnl {
 font-weight: 500;
 }

 .history-pnl.positive { color: var(--profit); }
 .history-pnl.negative { color: var(--loss); }

 .history-profit {
 font-weight: 500;
 font-size: 12px;
 }

 .history-profit.positive { color: var(--profit); }
 .history-profit.negative { color: var(--loss); }

 .history-side {
 padding: 3px 8px;
 border-radius: 3px;
 font-size: 11px;
 text-align: center;
 }

 .history-side.long {
 background: rgba(46,189,133,0.15);
 color: var(--profit);
 }

 .history-side.short {
 background: rgba(246,70,93,0.15);
 color: var(--loss);
 }

 .history-time {
 color: var(--gray-text);
 font-size: 12px;
 text-align: right;
 }

 .history-date {
 color: var(--gray-text);
 font-size: 12px;
 text-align: right;
 }

 @media (max-width: 768px) {
 .history-item {
 grid-template-columns: 1fr 1fr;
 gap: 8px;
 }
 .history-time, .history-date {
 grid-column: span 2;
 text-align: left;
 }
 }
</style>

<script>
 // Custom cursor
 const cursor = document.getElementById('cursor');
 const cursorRing = document.getElementById('cursorRing');

 document.addEventListener('mousemove', (e) => {
 cursor.style.left = e.clientX + 'px';
 cursor.style.top = e.clientY + 'px';
 cursorRing.style.left = e.clientX + 'px';
 cursorRing.style.top = e.clientY + 'px';
 });

// Update time
function updateTime() {
 const now = new Date();
 const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
 document.getElementById('navTime').textContent = timeStr;
}
updateTime();
setInterval(updateTime, 1000);

 // JSON数据源
 const JSON_URL = './data/trade_data.json';

 // 绑定历史记录按钮事件
document.addEventListener('DOMContentLoaded', function() {
 const historyBtn = document.getElementById('historyBtn');
 if (historyBtn) {
 historyBtn.addEventListener('click', function() {
 showHistory();
 });
 // 移动端触摸支持
 historyBtn.addEventListener('touchend', function(e) {
 e.preventDefault();
 showHistory();
 });
 }
});

// 绘制Sparkline曲线 - 4种情况直接绘制
function drawSparkline(canvas, data, isLong, isProfit, entryPrice) {
 const ctx = canvas.getContext('2d');
 const width = canvas.width;
 const height = canvas.height;
 
 // 清空画布
 ctx.clearRect(0, 0, width, height);
 
 if (!data || data.length < 2) return;
 
 // 确定4种情况之一
 // 1. 做多 + 正盈利 = 曲线向上 (价格上涨)
 // 2. 做多 + 负盈利 = 曲线向下 (价格下跌)
 // 3. 做空 + 正盈利 = 曲线向下 (价格下跌)
 // 4. 做空 + 负盈利 = 曲线向上 (价格上涨)
 
 // Canvas坐标：Y=0在顶部，Y=height在底部
 // 反转时：高价→小Y(上方)，低价→大Y(下方)
 // 不反转：高价→大Y(下方)，低价→小Y(上方)
 //
 // 曲线向上：需要低价→高价 = 从下方到上方，必须反转
 // 曲线向下：需要高价→低价 = 从上方到下方，必须反转
 //
 // 等等，两种情况都需要反转？那不对...
 //
 // 重新理解：
 // "曲线向上"视觉上是从左下到右上
 // "曲线向下"视觉上是从左上到右下
 //
 // 做多盈利（价格从低到高）：
 // - 反转：低价(大Y/下方)→高价(小Y/上方) = 从下到上 = 向上 ✓
 //
 // 做空盈利（价格从高到低）：
 // - 反转：高价(小Y/上方)→低价(大Y/下方) = 从上到下 = 向下 ✓
 //
 // 所以两种情况都要反转？那趋势怎么区分？
 //
 // 啊！区别在于数据点的顺序！
 // 做多盈利：数据点[低价, ..., 高价]，反转后[下方, ..., 上方] = 向上
 // 做空盈利：数据点[高价, ..., 低价]，反转后[上方, ..., 下方] = 向下
 //
 // 所以只要反转，让高价永远在上方，曲线的方向由数据自然决定！
 //
 // 但等等，如果都反转，那什么时候不反转？
 // 让我检查做空亏损（价格从低到高）：
 // - 做空亏损：价格上涨，开仓低价→当前高价
 // - 反转：低价(下方)→高价(上方) = 向上
 // - 但做空亏损应该曲线向上，这符合！
 //
 // 做多亏损（价格从高到低）：
 // - 做多亏损：价格下跌，开仓高价→当前低价
 // - 反转：高价(上方)→低价(下方) = 向下
 // - 做多亏损应该曲线向下，这也符合！
 //
 // 结论：所有情况都要反转，让高价在上方！
 // 曲线的方向由价格数据的自然走势决定
 //
 // 但等等，如果都不反转呢？
 // 做多盈利：低价(上方)→高价(下方) = 向下 ✗
 //
 // 所以必须反转，让高价在上方！
 // 那trendUp变量还有用吗？
 // 等等，让我再想想...
 //
 // 哦！我理解错了！用户说的"向上""向下"可能是指：
 // - 盈利时曲线朝上（无论多空）
 // - 亏损时曲线朝下（无论多空）
 //
 // 不对，用户明确说了4种情况...
 //
 // 让我直接测试ETHUSDT数据：
 // entry=2402.84, last=2299.48, 做空盈利
 // history: [2405.21, 2390.21, ... , 2299.48] 整体下跌
 //
 // 如果反转：高价(2405)→小Y(上方), 低价(2299)→大Y(下方)
 // 视觉上：从左上到右下 = 向下 ✓
 //
 // 如果不反转：高价(2405)→大Y(下方), 低价(2299)→小Y(上方)
 // 视觉上：从左下到右上 = 向上 ✗
 //
 // 所以做空盈利必须反转！
 // 但当前代码trendUp=false时不反转...
 //
 // 问题找到了！条件写反了！
 // 应该：做空盈利时反转(trendUp=false→反转)
 // 实际：做空盈利时不反转(trendUp=false→不反转)
 //
 // 修正：把条件反过来！
 // 原代码：if (trendUp) { 反转 }
 // 改为：if (!trendUp) { 反转 } ... 不对
 //
 // 让我重新定义：
 // invert = true: 高价在上方（小Y）
 // invert = false: 高价在下方（大Y）
 //
 // 需要invert=true的情况：做空盈利、做多盈利（都要高价在上方）
 // 等等，做多盈利也要高价在上方？
 // 做多盈利：低价→高价，高价在右上方 = 向上 ✓
 //
 // 需要invert=false的情况：做空亏损、做多亏损
 // 做空亏损：低价→高价，高价在右下方 = 向上？不对
 // 如果高价在下方，低价在上方：
 // 低价(上方)→高价(下方) = 从上到下 = 向下？
 //
 // 让我画出来：
 // invert=true（高价在上）：

 chartData.forEach((price, i) => {

 //

 // 根据趋势方向决定Y轴方向

 if (invertY) {

 const y = normalizedY * (height - 10) + 5;
 
 if (i === 0) {

 } else {

 ctx.quadraticCurveTo(cpX, prevY, x, y);
 }
 });
 
 ctx.stroke();

 if (invertY) {

 ctx.beginPath();

 // 渲染交易卡片
 async function renderTraderCards() {
 try {
 const response = await fetch(JSON_URL);
 const trades = await response.json();
 const container = document.getElementById('cards-container');
 const template = document.getElementById('card-template');
 
 container.innerHTML = ''; // 清空容器
 
 trades.forEach((trade, index) => {
 // 1. 克隆模板
 const clone = template.content.cloneNode(true);
 const card = clone.querySelector('.trade-card');
 
 // 2. 判断盈亏和方向
 const isProfit = parseFloat(trade.pnl) >= 0;
 const isLong = trade.side === 'LONG';
 const themeClass = isProfit ? 'positive' : 'negative';
 
 // 3. 添加主题类
 card.classList.add(themeClass);
 
 // 4. 注入基础数据
 card.querySelector('.symbol-name').textContent = trade.symbol;
 card.querySelector('.pnl-percentage').textContent = trade.pnl + '%';
 card.querySelector('.pnl-percentage').classList.add(themeClass);
 card.querySelector('.lev-tag').textContent = trade.lev + 'X';
 
 const sideTag = card.querySelector('.side-tag');
 sideTag.textContent = isLong ? '做多' : '做空';
 sideTag.classList.add(isLong ? 'long' : 'short');
 
 card.querySelector('.pnl-status-value').textContent = 
 (trade.profit || (parseFloat(trade.pnl) * parseFloat(trade.entry) / 100).toFixed(2)) + ' USDT';
 card.querySelector('.pnl-status-value').classList.add(themeClass);
 
 card.querySelector('.entry-val').textContent = trade.entry;
 card.querySelector('.last-val').textContent = trade.last || trade.exit || '--';
 
 // 时间显示：使用数据中的时间戳，格式为 DD/MM/YEAR
 const timeAgo = trade.time 
 ? new Date(trade.time).toLocaleDateString('zh-CN', {day: '2-digit', month: '2-digit', year: 'numeric'})
 : new Date().toLocaleDateString('zh-CN', {day: '2-digit', month: '2-digit', year: 'numeric'});
 card.querySelector('.time-ago').textContent = timeAgo;
 
 // 5. 绘制趋势图
 const canvas = clone.querySelector('.sparkline');
 if (trade.history && trade.history.length > 0) {
 drawSparkline(canvas, trade.history, isLong, isProfit, trade.entry);
 } else {
 // 如果没有历史数据，生成模拟曲线
 const mockData = generateMockCurve(isLong, isProfit, 20, trade.entry);
 drawSparkline(canvas, mockData, isLong, isProfit, trade.entry);
 }
 
 container.appendChild(clone);
 });
 } catch (err) {
 console.error('渲染失败:', err);
 }
 }

// 生成模拟曲线数据 - 按4种情况生成
function generateMockCurve(isLong, isProfit, points, entryPrice) {
 const data = [];
 const basePrice = parseFloat(entryPrice) || 100;
 
 // 4种情况决定价格趋势方向
 // 1. 做多 + 正盈利 = 价格上涨 (trend = 1)
 // 2. 做多 + 负盈利 = 价格下跌 (trend = -1)
 // 3. 做空 + 正盈利 = 价格下跌 (trend = -1)
 // 4. 做空 + 负盈利 = 价格上涨 (trend = 1)
 let trend;
 if (isLong && isProfit) {
 trend = 1; // 做多盈利 → 价格上涨
 } else if (isLong && !isProfit) {
 trend = -1; // 做多亏损 → 价格下跌
 } else if (!isLong && isProfit) {
 trend = -1; // 做空盈利 → 价格下跌
 } else {
 trend = 1; // 做空亏损 → 价格上涨
 }
 
 for (let i = 0; i < points; i++) {
 const progress = i / (points - 1);
 const noise = Math.sin(i * 0.5) * (basePrice * 0.02);
 const direction = trend * progress * (basePrice * 0.1);
 data.push(basePrice + direction + noise);
 }
 return data;
}

 : `https://trader.brandonwilson8855.workers.dev/history`;
 
 try {

 modal.className = 'history-modal';
 modal.innerHTML = `
 <div class="history-overlay" onclick="closeHistory()"></div>
 <div class="history-content">
 <div class="history-header">
 <h2>📊 历史交易记录 ${symbol ? '- ' + symbol : ''}</h2>
 <button class="close-btn" onclick="closeHistory()">&times;</button>
 </div>
 <div class="history-body">

 </div>
 `).join('')}
 </div>
 </div>
 </div>
 `;
 document.body.appendChild(modal);

 }

 // 关闭历史记录弹窗
 function closeHistory() {
 const modal = document.querySelector('.history-modal');
 if (modal) {

 }
 }
