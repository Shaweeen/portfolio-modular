<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trader - 21MBitcoin</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;700;900&display=swap" rel="stylesheet"/>
<style>
 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

 :root {
 --black: #000000;
 --white: #ffffff;
 --gray-1: #0a0a0a;
 --gray-2: #111111;
 --gray-3: #1a1a1a;
 --gray-4: #222222;
 --gray-5: #2e2e2e;
 --gray-6: #3a3a3a;
 --gray-text: #666666;
 --gray-light: #aaaaaa;
 --accent: #b8ff57;
 --accent-dim: rgba(184,255,87,0.12);
 --accent-border: rgba(184,255,87,0.25);
 --border: rgba(255,255,255,0.07);
 --border-strong: rgba(255,255,255,0.12);
 }

 html, body {
 background: var(--black);
 color: var(--white);
 font-family: 'Noto Sans SC', sans-serif;
 min-height: 100vh;
 overflow-x: hidden;
 cursor: none;
 }

 /* Custom cursor */
 .cursor {
 position: fixed;
 width: 8px; height: 8px;
 background: var(--white);
 border-radius: 50%;
 pointer-events: none;
 z-index: 9999;
 transform: translate(-50%,-50%);
 transition: transform 0.1s, background 0.2s, width 0.2s, height 0.2s;
 mix-blend-mode: difference;
 }
 .cursor-ring {
 position: fixed;
 width: 32px; height: 32px;
 border: 1px solid rgba(255,255,255,0.4);
 border-radius: 50%;
 pointer-events: none;
 z-index: 9998;
 transform: translate(-50%,-50%);
 transition: transform 0.15s ease, width 0.2s, height 0.2s, border-color 0.2s;
 }

 /* Noise overlay */
 body::before {
 content: '';
 position: fixed;
 inset: 0;
 background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
 pointer-events: none;
 z-index: 100;
 opacity: 0.4;
 }

 /* NAVBAR */
 nav {
 position: fixed;
 top: 0; left: 0; right: 0;
 z-index: 500;
 display: flex;
 align-items: center;
 justify-content: space-between;
 padding: 0 32px;
 height: 54px;
 border-bottom: 1px solid var(--border);
 background: rgba(0,0,0,0.85);
 backdrop-filter: blur(20px);
 -webkit-backdrop-filter: blur(20px);
 }

 .nav-logo {
 font-family: 'DM Mono', monospace;
 font-size: 15px;
 font-weight: 500;
 letter-spacing: 0.02em;
 color: var(--white);
 text-decoration: none;
 }

 .nav-links {
 display: flex;
 gap: 28px;
 list-style: none;
 }
 .nav-links a {
 font-size: 13px;
 color: var(--gray-light);
 text-decoration: none;
 letter-spacing: 0.03em;
 transition: color 0.2s;
 font-weight: 300;
 }
 .nav-links a:hover, .nav-links a.active { color: var(--accent); }

 .nav-right {
 display: flex;
 align-items: center;
 gap: 16px;
 }

 .nav-time {
 font-family: 'DM Mono', monospace;
 font-size: 12px;
 color: var(--gray-text);
 letter-spacing: 0.05em;
 }

 .nav-lang {
 font-size: 12px;
 color: var(--gray-light);
 font-family: 'DM Mono', monospace;
 border: 1px solid var(--border-strong);
 padding: 3px 8px;
 border-radius: 3px;
 cursor: none;
 letter-spacing: 0.04em;
 }

 .nav-theme-btn {
 width: 28px; height: 28px;
 border: 1px solid var(--border-strong);
 border-radius: 50%;
 background: none;
 cursor: none;
 display: flex;
 align-items: center;
 justify-content: center;
 }

 .nav-theme-btn svg { stroke: var(--gray-light); width: 14px; height: 14px; }

 /* MAIN */
 main {
 display: flex;
 min-height: 100vh;
 padding-top: 54px;
 position: relative;
 }

 .content {
 flex: 1;
 padding: 64px 48px;
 display: flex;
 flex-direction: column;
 }

 .page-header {
 margin-bottom: 48px;
 animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) both;
 }

 @keyframes fadeUp {
 from { opacity: 0; transform: translateY(28px); }
 to { opacity: 1; transform: translateY(0); }
 }

 .page-title {
 font-family: 'Noto Serif SC', serif;
 font-size: clamp(32px, 4vw, 48px);
 font-weight: 900;
 line-height: 1.1;
 letter-spacing: -0.01em;
 color: var(--white);
 margin-bottom: 16px;
 }

 .page-subtitle {
 font-size: 14px;
 font-weight: 300;
 color: var(--gray-light);
 line-height: 1.8;
 letter-spacing: 0.02em;
 }

 /* Trading Data Grid */
 .data-grid {
 display: grid;
 grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
 gap: 24px;
 margin-top: 32px;
 animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.2s both;
 }

 .data-card {
 background: var(--gray-1);
 border: 1px solid var(--border);
 border-radius: 10px;
 padding: 24px;
 transition: border-color 0.2s, transform 0.2s;
 }

 .data-card:hover {
 border-color: var(--accent-border);
 transform: translateY(-4px);
 }

 .card-header {
 display: flex;
 justify-content: space-between;
 align-items: center;
 margin-bottom: 16px;
 }

 .card-symbol {
 font-family: 'DM Mono', monospace;
 font-size: 18px;
 font-weight: 500;
 color: var(--white);
 }

 .card-change {
 font-family: 'DM Mono', monospace;
 font-size: 14px;
 padding: 4px 10px;
 border-radius: 4px;
 }

 .card-change.pos {
 background: rgba(52,168,83,0.18);
 color: #34a853;
 }

 .card-change.neg {
 background: rgba(234,67,53,0.18);
 color: #ea4335;
 }

 .card-price {
 font-family: 'DM Mono', monospace;
 font-size: 32px;
 font-weight: 500;
 color: var(--white);
 margin-bottom: 8px;
 }

 .card-volume {
 font-size: 12px;
 color: var(--gray-text);
 font-family: 'DM Mono', monospace;
 }

 .card-chart {
 margin-top: 20px;
 height: 60px;
 display: flex;
 align-items: flex-end;
 gap: 4px;
 }

 .chart-bar {
 flex: 1;
 border-radius: 2px 2px 0 0;
 background: var(--gray-5);
 transition: background 0.2s;
 }

 .chart-bar.up { background: #34a853; }
 .chart-bar.down { background: #ea4335; }

 /* Status bar */
 .status-bar {
 position: fixed;
 bottom: 0; left: 0; right: 0;
 height: 22px;
 border-top: 1px solid var(--border);
 background: var(--gray-1);
 display: flex;
 align-items: center;
 padding: 0 16px;
 gap: 16px;
 z-index: 400;
 }

 .status-item {
 font-family: 'DM Mono', monospace;
 font-size: 10px;
 color: var(--gray-text);
 letter-spacing: 0.04em;
 }

 .status-item.online { color: #34a853; }
 .status-item.online::before {
 content: '';
 display: inline-block;
 width: 5px; height: 5px;
 border-radius: 50%;
 background: #34a853;
 margin-right: 5px;
 animation: pulse 2s infinite;
 }

 @keyframes pulse {
 0%,100% { opacity: 1; } 50% { opacity: 0.3; }
 }

 @media (max-width: 900px) {
 .content { padding: 40px 24px; }
 .data-grid { grid-template-columns: 1fr; }
 }
</style>
</head>
<body>

</nav>

<!-- Status bar -->
<div class="status-bar">

 <span class="status-item">数据延迟: 150ms</span>
 <span class="status-item">最后更新: <span id="lastUpdate">--</span></span>
</div>

<script>
 // Custom cursor
 const cursor = document.getElementById('cursor');
 const cursorRing = document.getElementById('cursorRing');

 document.addEventListener('mousemove', (e) => {
 cursor.style.left = e.clientX + 'px';
 cursor.style.top = e.clientY + 'px';
 cursorRing.style.left = e.clientX + 'px';
 cursorRing.style.top = e.clientY + 'px';
 });

 // Update time
 function updateTime() {
 const now = new Date();
 const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
 document.getElementById('navTime').textContent = timeStr;
 document.getElementById('lastUpdate').textContent = now.toLocaleString('zh-CN');
 }
 updateTime();
 setInterval(updateTime, 1000);
</script>

</body>
</html>
