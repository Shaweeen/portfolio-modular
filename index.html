<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio 2026 - 21MxBitcoin</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;700;900&display=swap" rel="stylesheet"/>
<style>
:root {
--bg: #000000;
--card: #0a0a0a;
--border: rgba(255,255,255,0.07);
--text: #ffffff;
--dim: #666666;
--green: #b8ff57;
--accent-border: rgba(184,255,87,0.25);
--gray-1: #0a0a0a;
--gray-2: #111111;
--gray-3: #1a1a1a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(--bg);
color: var(--text);
font-family: 'DM Mono', monospace;
padding: 20px;
min-height: 100vh;
}

/* 导航栏 */
nav {
display: flex;
align-items: center;
justify-content: space-between;
padding: 0 20px;
height: 54px;
border-bottom: 1px solid var(--border);
margin-bottom: 30px;
}

.nav-logo {
font-family: 'DM Mono', monospace;
font-size: 16px;
font-weight: 700;
letter-spacing: 0.05em;
color: var(--green);
text-decoration: none;
text-transform: uppercase;
}

.nav-links {
display: flex;
gap: 24px;
}

.nav-links a {
color: var(--dim);
text-decoration: none;
font-size: 12px;
text-transform: lowercase;
transition: color 0.2s;
}

.nav-links a:hover {
color: var(--text);
}

/* 标题区域 */
.header-section {
max-width: 1200px;
margin: 0 auto 20px;
display: flex;
justify-content: space-between;
align-items: center;
}

#sheet-title {
color: var(--dim);
font-weight: 400;
font-size: 14px;
letter-spacing: 0.1em;
text-transform: uppercase;
}

.data-source {
color: var(--dim);
font-size: 11px;
}

/* 表格容器 */
.table-box {
max-width: 1200px;
margin: 0 auto;
border: 1px solid var(--border);
border-radius: 8px;
background: var(--card);
overflow: hidden;
}

table {
width: 100%;
border-collapse: collapse;
table-layout: fixed;
}

th {
background: var(--gray-2);
color: var(--dim);
padding: 14px 12px;
text-align: left;
font-size: 11px;
font-weight: 500;
border-bottom: 1px solid var(--border);
letter-spacing: 0.05em;
text-transform: uppercase;
}

td {
padding: 12px;
border-bottom: 1px solid var(--border);
font-size: 12px;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
color: var(--text);
}

tr:hover {
background: rgba(255,255,255,0.02);
}

/* 关键：收缩锁定行的 CSS */
.locked-row {
background: linear-gradient(180deg, var(--gray-1) 0%, #050505 100%);
color: #444;
text-align: center;
font-style: italic;
}

.locked-row td {
padding: 30px;
border-bottom: 1px dashed #222;
color: #555;
font-size: 11px;
letter-spacing: 0.1em;
}

/* 收益为正显示绿色 */
.positive {
color: var(--green) !important;
}

/* 状态标签 */
.tag {
display: inline-block;
padding: 2px 8px;
border-radius: 4px;
font-size: 10px;
font-weight: 500;
}

.tag-long {
background: rgba(52,168,83,0.15);
color: #34a853;
}

.tag-short {
background: rgba(246,70,93,0.15);
color: #f6465d;
}

/* 加载状态 */
.loading {
text-align: center;
padding: 60px;
color: var(--dim);
font-size: 12px;
}

/* 错误状态 */
.error {
text-align: center;
padding: 60px;
color: #f6465d;
font-size: 12px;
}

/* 响应式 */
@media (max-width: 768px) {
body { padding: 10px; }
.table-box { border-radius: 0; border-left: none; border-right: none; }
th, td { padding: 10px 8px; font-size: 11px; }
}
</style>
</head>
<body>

<!-- 导航栏 -->
<nav>
<a href="index.html" class="nav-logo">Web3空投/airdrop</a>
<div class="nav-links">
<a href="trader.html">trader</a>
<a href="alpha.html">alpha</a>
</div>
</nav>

<!-- 标题 -->
<div class="header-section">
<h2 id="sheet-title">DASHBOARD</h2>
<span class="data-source">DATA: trade_data.json</span>
</div>

<!-- 表格容器 -->
<div class="table-box">
<table>
<thead id="h-head"></thead>
<tbody id="h-body"></tbody>
</table>
</div>

<script>
// 数据文件路径 - 使用交易数据
const DATA_PATH = './data/trade_data.json';

async function init() {
const thead = document.getElementById('h-head');
const tbody = document.getElementById('h-body');

try {
const res = await fetch(DATA_PATH);
if (!res.ok) throw new Error('数据加载失败');
const json = await res.json();

// 设置标题
document.getElementById('sheet-title').innerText = 'TRADING RECORDS';

// 定义表头
thead.innerHTML = `
<tr>
<th>交易对</th>
<th>方向</th>
<th>收益率</th>
<th>盈亏</th>
<th>开仓价</th>
<th>当前价</th>
<th>杠杆</th>
<th>日期</th>
</tr>
`;

// 清空tbody
tbody.innerHTML = '';

// 渲染数据行 - 最多显示9行
json.slice(0, 9).forEach((item, index) => {
const tr = document.createElement('tr');

// 解析数据
const symbol = item.symbol || '--';
const side = item.side || '--';
const pnl = item.pnl || '0%';
const profit = item.profit || '--';
const entry = item.entry || '--';
const last = item.last || '--';
const lev = item.lev || '--';
const time = item.time ? new Date(item.time).toLocaleDateString('zh-CN', {
day: '2-digit', month: '2-digit', year: 'numeric'
}) : new Date().toLocaleDateString('zh-CN', {
day: '2-digit', month: '2-digit', year: 'numeric'
});

// 判断正负
const pnlNum = parseFloat(pnl);
const isPositive = pnlNum >= 0;
const profitNum = parseFloat(profit);
const isProfitPositive = profitNum >= 0;

// 方向标签
const sideClass = side === 'LONG' ? 'tag-long' : 'tag-short';
const sideText = side === 'LONG' ? '做多' : '做空';

tr.innerHTML = `
<td>${symbol}</td>
<td><span class="tag ${sideClass}">${sideText}</span></td>
<td class="${isPositive ? 'positive' : ''}">${pnl}</td>
<td class="${isProfitPositive ? 'positive' : ''}">${profit} USDT</td>
<td>${entry}</td>
<td>${last}</td>
<td>${lev}</td>
<td style="color: #888;">${time}</td>
`;

tbody.appendChild(tr);
});

// 如果数据超过9行，显示锁定行
if (json.length > 9) {
const lockedRow = document.createElement('tr');
lockedRow.className = 'locked-row';
lockedRow.innerHTML = `<td colspan="8">🔒 RESTRICTED DATA: RECENT 9 ITEMS ONLY (${json.length - 9} MORE HIDDEN)</td>`;
tbody.appendChild(lockedRow);
}

} catch (err) {
console.error('数据加载失败:', err);
tbody.innerHTML = `
<tr>
<td colspan="8" class="error">
数据加载失败: ${err.message}<br>
请检查 data/trade_data.json 文件是否存在
</td>
</tr>
`;
}
}

init();
</script>

</body>
</html>
